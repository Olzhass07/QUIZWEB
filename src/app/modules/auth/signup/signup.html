<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Тіркелу</h1>
      <p>Өз біліміңізді тексеруді бастаңыз</p>
    </div>

    <form nz-form [formGroup]="validateForm" class="signup-form" (ngSubmit)="submitForm()">
      <!-- Name -->
      <div class="form-group">
        <label>Аты-жөніңіз</label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Аты-жөніңізді енгізіңіз!">
            <input nz-input formControlName="name" placeholder="Аты-жөніңіз" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <!-- Age -->
      <div class="form-group">
        <label>Жасыңыз</label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Жасыңызды көрсетіңіз!">
            <input type="number" nz-input formControlName="age" placeholder="Жасыңыз" min="1" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Электрондық пошта</label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Жарамды email енгізіңіз!">
            <input type="email" nz-input formControlName="email" placeholder="email@example.com" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Құпия сөз</label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Құпия сөзді енгізіңіз!">
            <div class="password-input-wrapper">
              <input [type]="passwordVisible ? 'text' : 'password'" nz-input formControlName="password"
                placeholder="Құпия сөз" />
              <span class="eye-icon" (click)="passwordVisible = !passwordVisible">
                <i nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"></i>
              </span>
            </div>
          </nz-form-control>
        </nz-form-item>

        <!-- Dynamic Password Hints -->
        <div class="password-hints" *ngIf="password?.dirty && password?.invalid">
          <p>Құпия сөз талаптары:</p>
          <ul>
            <li [class.valid]="password?.value?.length >= 8" [class.invalid]="password?.value?.length < 8">
              <i nz-icon [nzType]="password?.value?.length >= 8 ? 'check' : 'close'"></i>
              Кемінде 8 таңба
            </li>
            <li [class.valid]="checkRequirement(regexUpper)" [class.invalid]="!checkRequirement(regexUpper)">
              <i nz-icon [nzType]="checkRequirement(regexUpper) ? 'check' : 'close'"></i>
              Үлкен әріп (A-Z)
            </li>
            <li [class.valid]="checkRequirement(regexLower)" [class.invalid]="!checkRequirement(regexLower)">
              <i nz-icon [nzType]="checkRequirement(regexLower) ? 'check' : 'close'"></i>
              Кіші әріп (a-z)
            </li>
            <li [class.valid]="checkRequirement(regexDigit)" [class.invalid]="!checkRequirement(regexDigit)">
              <i nz-icon [nzType]="checkRequirement(regexDigit) ? 'check' : 'close'"></i>
              Кемінде 1 сан
            </li>
            <li [class.valid]="checkRequirement(regexSpecial)" [class.invalid]="!checkRequirement(regexSpecial)">
              <i nz-icon [nzType]="checkRequirement(regexSpecial) ? 'check' : 'close'"></i>
              Арнайы таңба (@#$%^&+=!)
            </li>
          </ul>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label>Құпия сөзді растау</label>
        <nz-form-item>
          <nz-form-control [nzErrorTip]="errorTpl">
            <div class="password-input-wrapper">
              <input [type]="confirmPasswordVisible ? 'text' : 'password'" nz-input formControlName="confirmPassword"
                placeholder="Құпия сөзді растау" />
              <span class="eye-icon" (click)="confirmPasswordVisible = !confirmPasswordVisible">
                <i nz-icon [nzType]="confirmPasswordVisible ? 'eye-invisible' : 'eye'"></i>
              </span>
            </div>
            <ng-template #errorTpl let-control>
              <ng-container *ngIf="control.hasError('required')">Құпия сөзді растау қажет!</ng-container>
              <ng-container *ngIf="control.hasError('mismatch')">Құпия сөздер сәйкес келмейді!</ng-container>
            </ng-template>
          </nz-form-control>
        </nz-form-item>
      </div>

      <button nz-button class="register-form-button" nzType="primary">
        Тіркелу
      </button>

      <div class="auth-footer">
        Аккаунтыңыз бар ма? <a routerLink="/login">Кіру</a>
      </div>
    </form>
  </div>
</div>
