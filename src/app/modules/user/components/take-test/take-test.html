<div class="test-interface animate-fade">
  <!-- Status & Progress -->
  <div class="test-header">
    <div class="quiz-info">
      <div class="q-count">
        Сұрақ {{ currentQuestionIndex + 1 }} <span>/ {{ questions.length }}</span>
      </div>
      <div class="timer-badge" [class.danger]="timeRemaining <= 30">
        <i nz-icon nzType="clock-circle"></i>
        {{ getFormattedTime() }}
      </div>
    </div>
    <nz-progress [nzPercent]="getProgress()" [nzShowInfo]="false" [nzStrokeWidth]="12"
      [nzStrokeColor]="{ '0%': '#6366f1', '100%': '#8b5cf6' }"></nz-progress>
  </div>

  <!-- Question Content -->
  <div *ngIf="questions.length > 0">
    <div class="question-card" [class.entry]="!isAnimating">
      <div class="question-text">
        {{ questions[currentQuestionIndex].questionText }}
      </div>

      <div class="options-list" [ngSwitch]="questions[currentQuestionIndex].questionType">
        <!-- Multiple Choice -->
        <div *ngSwitchCase="'MULTIPLE_CHOICE'">
          <nz-radio-group [(ngModel)]="selectedAnswers[questions[currentQuestionIndex].id]"
            (ngModelChange)="onAnswerChange(questions[currentQuestionIndex].id, $event)">
            <label nz-radio nzValue="optionA">{{ questions[currentQuestionIndex].optionA }}</label>
            <label nz-radio nzValue="optionB">{{ questions[currentQuestionIndex].optionB }}</label>
            <label nz-radio nzValue="optionC">{{ questions[currentQuestionIndex].optionC }}</label>
            <label nz-radio nzValue="optionD">{{ questions[currentQuestionIndex].optionD }}</label>
          </nz-radio-group>
        </div>

        <!-- True/False -->
        <div *ngSwitchCase="'TRUE_FALSE'">
          <nz-radio-group [(ngModel)]="selectedAnswers[questions[currentQuestionIndex].id]"
            (ngModelChange)="onAnswerChange(questions[currentQuestionIndex].id, $event)">
            <label nz-radio nzValue="True">Ақиқат</label>
            <label nz-radio nzValue="False">Жалған</label>
          </nz-radio-group>
        </div>

        <!-- Short Answer -->
        <div *ngSwitchCase="'SHORT_ANSWER'">
          <input nz-input class="premium-input" placeholder="Жауабыңызды осында жазыңыз..."
            [(ngModel)]="selectedAnswers[questions[currentQuestionIndex].id]"
            (ngModelChange)="onAnswerChange(questions[currentQuestionIndex].id, $event)" />
        </div>
      </div>

      <!-- Navigation -->
      <div class="nav-controls">
        <button nz-button nzType="default" (click)="previousQuestion()" [disabled]="currentQuestionIndex === 0">
          <i nz-icon nzType="arrow-left"></i> Алдыңғы
        </button>

        <button *ngIf="currentQuestionIndex < questions.length - 1" nz-button nzType="primary" (click)="nextQuestion()">
          Келесі <i nz-icon nzType="arrow-right"></i>
        </button>

        <button *ngIf="currentQuestionIndex === questions.length - 1" nz-button nzType="primary"
          (click)="submitAnswers()" [nzLoading]="isSubmitted">
          Аяқтау <i nz-icon nzType="send"></i>
        </button>
      </div>
    </div>
  </div>
</div>
