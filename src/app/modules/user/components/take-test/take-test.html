<div style="margin: auto; width: 80%; padding-top: 20px;">
  <div class="test-header" style="margin-bottom: 20px;">
    <nz-progress [nzPercent]="getProgress()" [nzStatus]="'active'"></nz-progress>
    <div class="timer-container"
      style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
      <div class="question-count">
        Сұрақ {{ currentQuestionIndex + 1 }} / {{ questions.length }}
      </div>
      <div class="timer" [class.pulse-red]="timeRemaining <= 10">
        <i nz-icon nzType="clock-circle"></i> {{ getFormattedTime() }}
      </div>
    </div>
  </div>

  <form (ngSubmit)="submitAnswers()">
    <div *ngIf="questions.length > 0">
      <div class="question-container" [class.slide-in]="!isAnimating">
        <div class="question">
          <h3>{{ questions[currentQuestionIndex].questionText }}</h3>

          <div [ngSwitch]="questions[currentQuestionIndex].questionType">
            <!-- Multiple Choice -->
            <div *ngSwitchCase="'MULTIPLE_CHOICE'">
              <nz-radio-group [(ngModel)]="selectedAnswers[questions[currentQuestionIndex].id]"
                name="ans{{questions[currentQuestionIndex].id}}">
                <label nz-radio nzValue="optionA" style="display: block; margin-bottom: 10px;">{{
                  questions[currentQuestionIndex].optionA }}</label>
                <label nz-radio nzValue="optionB" style="display: block; margin-bottom: 10px;">{{
                  questions[currentQuestionIndex].optionB }}</label>
                <label nz-radio nzValue="optionC" style="display: block; margin-bottom: 10px;">{{
                  questions[currentQuestionIndex].optionC }}</label>
                <label nz-radio nzValue="optionD" style="display: block; margin-bottom: 10px;">{{
                  questions[currentQuestionIndex].optionD }}</label>
              </nz-radio-group>
            </div>

            <!-- True or False -->
            <div *ngSwitchCase="'TRUE_FALSE'">
              <nz-radio-group [(ngModel)]="selectedAnswers[questions[currentQuestionIndex].id]"
                name="ans{{questions[currentQuestionIndex].id}}">
                <label nz-radio nzValue="True" style="display: block; margin-bottom: 10px;">Ақиқат</label>
                <label nz-radio nzValue="False" style="display: block; margin-bottom: 10px;">Жалған</label>
              </nz-radio-group>
            </div>

            <!-- Short Answer -->
            <div *ngSwitchCase="'SHORT_ANSWER'">
              <input nz-input type="text" placeholder="Жауабыңызды жазыңыз"
                [(ngModel)]="selectedAnswers[questions[currentQuestionIndex].id]"
                name="ans{{questions[currentQuestionIndex].id}}" />
            </div>
          </div>
        </div>

        <div class="navigation-buttons" style="margin-top: 30px; display: flex; justify-content: space-between;">
          <button nz-button nzType="default" type="button" (click)="previousQuestion()"
            [disabled]="currentQuestionIndex === 0">
            <i nz-icon nzType="left"></i> Алдыңғы
          </button>

          <button *ngIf="currentQuestionIndex < questions.length - 1" nz-button nzType="primary" type="button"
            (click)="nextQuestion()">
            Келесі <i nz-icon nzType="right"></i>
          </button>

          <button *ngIf="currentQuestionIndex === questions.length - 1" nz-button nzType="primary" type="submit">
            Аяқтау <i nz-icon nzType="check"></i>
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
