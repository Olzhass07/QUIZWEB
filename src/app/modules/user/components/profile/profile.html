<div style="padding: 20px; max-width: 1000px; margin: auto;">
    <div nz-row [nzGutter]="24">
        <!-- Stats Section -->
        <div nz-col nzSpan="24" style="margin-bottom: 24px;">
            <nz-card nzTitle="Менің жетістіктерім" [nzBordered]="false" class="stats-card">
                <div nz-row [nzGutter]="16">
                    <div nz-col nzSpan="12">
                        <nz-statistic [nzValue]="profileData.testsTaken" nzTitle="Өтілген тесттер"
                            [nzPrefix]="prefixTemplateOne"></nz-statistic>
                        <ng-template #prefixTemplateOne><i nz-icon nzType="form"></i></ng-template>
                    </div>
                    <div nz-col nzSpan="12">
                        <nz-statistic [nzValue]="profileData.averageScore" nzTitle="Орташа балл (%)"
                            [nzPrefix]="prefixTemplateTwo" [nzSuffix]="'%'"></nz-statistic>
                        <ng-template #prefixTemplateTwo><i nz-icon nzType="dashboard"></i></ng-template>
                        <nz-progress [nzPercent]="profileData.averageScore"
                            [nzStatus]="profileData.averageScore >= 50 ? 'active' : 'exception'"></nz-progress>
                    </div>
                </div>
            </nz-card>
        </div>

        <!-- Profile Edit Section -->
        <div nz-col nzXs="24" nzMd="12">
            <nz-card nzTitle="Жеке ақпаратты өңдеу" [nzBordered]="false" class="profile-card">
                <form nz-form [formGroup]="profileForm" (ngSubmit)="updateProfile()">
                    <nz-form-item>
                        <nz-form-label [nzSm]="6" [nzXs]="24">Аты</nz-form-label>
                        <nz-form-control [nzSm]="18" [nzXs]="24">
                            <input nz-input formControlName="name" />
                        </nz-form-control>
                    </nz-form-item>
                    <nz-form-item>
                        <nz-form-label [nzSm]="6" [nzXs]="24">Жасы</nz-form-label>
                        <nz-form-control [nzSm]="18" [nzXs]="24">
                            <nz-input-number formControlName="age" [nzMin]="1" style="width: 100%;"></nz-input-number>
                        </nz-form-control>
                    </nz-form-item>
                    <nz-form-item>
                        <nz-form-control [nzOffset]="6">
                            <button nz-button nzType="primary" [disabled]="profileForm.invalid">Сақтау</button>
                        </nz-form-control>
                    </nz-form-item>
                </form>
            </nz-card>
        </div>

        <!-- Password Change Section -->
        <div nz-col nzXs="24" nzMd="12">
            <nz-card nzTitle="Құпиясөзді өзгерту" [nzBordered]="false" class="profile-card">
                <form nz-form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
                    <nz-form-item>
                        <nz-form-control nzHasFeedback>
                            <nz-input-group [nzSuffix]="oldSuffixTemplate">
                                <input [type]="passwordVisible ? 'text' : 'password'" nz-input
                                    formControlName="oldPassword" placeholder="Ескі құпиясөз" />
                            </nz-input-group>
                            <ng-template #oldSuffixTemplate>
                                <i nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
                                    (click)="passwordVisible = !passwordVisible"></i>
                            </ng-template>
                        </nz-form-control>
                    </nz-form-item>

                    <nz-form-item>
                        <nz-form-control nzHasFeedback [nzErrorTip]="passwordErrorTpl">
                            <nz-input-group [nzSuffix]="newSuffixTemplate">
                                <input [type]="newPasswordVisible ? 'text' : 'password'" nz-input
                                    formControlName="newPassword" placeholder="Жаңа құпиясөз" />
                            </nz-input-group>
                            <ng-template #newSuffixTemplate>
                                <i nz-icon [nzType]="newPasswordVisible ? 'eye-invisible' : 'eye'"
                                    (click)="newPasswordVisible = !newPasswordVisible"></i>
                            </ng-template>
                            <ng-template #passwordErrorTpl let-control>
                                <ng-container *ngIf="control.hasError('required')">Құпиясөз міндетті!</ng-container>
                                <ng-container *ngIf="control.hasError('pattern')">Құпиясөз талаптарға сай
                                    емес!</ng-container>
                            </ng-template>
                        </nz-form-control>
                    </nz-form-item>

                    <nz-form-item>
                        <nz-form-control nzHasFeedback [nzErrorTip]="confirmErrorTpl">
                            <nz-input-group [nzSuffix]="confirmSuffixTemplate">
                                <input [type]="confirmPasswordVisible ? 'text' : 'password'" nz-input
                                    formControlName="confirmPassword" placeholder="Жаңа құпиясөзді растау" />
                            </nz-input-group>
                            <ng-template #confirmSuffixTemplate>
                                <i nz-icon [nzType]="confirmPasswordVisible ? 'eye-invisible' : 'eye'"
                                    (click)="confirmPasswordVisible = !confirmPasswordVisible"></i>
                            </ng-template>
                            <ng-template #confirmErrorTpl let-control>
                                <ng-container *ngIf="passwordForm.hasError('mismatch')">Құпиясөздер сәйкес
                                    келмейді!</ng-container>
                            </ng-template>
                        </nz-form-control>
                    </nz-form-item>

                    <nz-form-item>
                        <nz-form-control>
                            <button nz-button nzType="primary" nzDanger [disabled]="passwordForm.invalid">Құпиясөзді
                                өзгерту</button>
                        </nz-form-control>
                    </nz-form-item>
                </form>
            </nz-card>
        </div>

        <!-- Recent Test Results Table -->
        <div nz-col nzSpan="24" style="margin-top: 24px;">
            <nz-card nzTitle="Соңғы тест нәтижелері" [nzBordered]="false" class="profile-card">
                <nz-table #resultsTable [nzData]="profileData.testResults" [nzPageSize]="5">
                    <thead>
                        <tr>
                            <th>Тест атауы</th>
                            <th>Балл</th>
                            <th>Пайыз</th>
                            <th>Әрекет</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let result of resultsTable.data">
                            <td>{{ result.testName }}</td>
                            <td>{{ result.correctAnswers }} / {{ result.totalQuestions }}</td>
                            <td>
                                <nz-progress [nzPercent]="result.percentage" nzSize="small"
                                    [nzStatus]="result.percentage >= 50 ? 'success' : 'exception'"></nz-progress>
                            </td>
                            <td>
                                <button nz-button nzType="link" [routerLink]="['/user/result-detail', result.id]">
                                    Көру <i nz-icon nzType="right"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </nz-table>
                <div *ngIf="profileData.testResults?.length === 0" style="text-align: center; padding: 20px;">
                    <p>Сізде әлі тест нәтижелері жоқ.</p>
                </div>
            </nz-card>
        </div>
    </div>
</div>
