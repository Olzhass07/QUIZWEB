<div class="profile-container animate-fade">
    <div class="profile-grid">
        <!-- Sidebar: Stats & Info -->
        <div class="sidebar">
            <nz-card nzTitle="Менің жетістіктерім" [nzBordered]="false" class="stats-card">
                <div nz-row [nzGutter]="16">
                    <div nz-col nzSpan="24" style="margin-bottom: 24px;">
                        <nz-statistic [nzValue]="profileData.testsTaken" nzTitle="Өтілген тесттер"
                            [nzPrefix]="prefixOne"></nz-statistic>
                        <ng-template #prefixOne><i nz-icon nzType="check-circle" style="color: white"></i></ng-template>
                    </div>
                    <div nz-col nzSpan="24">
                        <nz-statistic [nzValue]="profileData.averageScore" nzTitle="Орташа балл" [nzSuffix]="'%'"
                            [nzPrefix]="prefixTwo"></nz-statistic>
                        <ng-template #prefixTwo><i nz-icon nzType="line-chart" style="color: white"></i></ng-template>
                        <nz-progress [nzPercent]="profileData.averageScore" [nzShowInfo]="false" nzStatus="active"
                            [nzStrokeColor]="'#ffffff'"></nz-progress>
                    </div>
                </div>
            </nz-card>

            <nz-card [nzBordered]="false" class="profile-card" style="margin-top: 24px;">
                <div class="section-title">
                    <i nz-icon nzType="user"></i> Жеке деректер
                </div>
                <form nz-form [formGroup]="profileForm" (ngSubmit)="updateProfile()">
                    <nz-form-item>
                        <nz-form-label [nzNoColon]="true">Аты-жөні</nz-form-label>
                        <nz-form-control>
                            <input nz-input formControlName="name" />
                        </nz-form-control>
                    </nz-form-item>
                    <nz-form-item>
                        <nz-form-label [nzNoColon]="true">Жасы</nz-form-label>
                        <nz-form-control>
                            <input type="number" nz-input formControlName="age" />
                        </nz-form-control>
                    </nz-form-item>
                    <button nz-button nzType="primary" class="full-width-btn" style="width: 100%">Жаңарту</button>
                </form>
            </nz-card>
        </div>

        <!-- Main Content: Results & Password -->
        <div class="main-content-flow">
            <nz-card nzTitle="Соңғы тест нәтижелері" [nzBordered]="false" class="profile-card table-premium">
                <nz-table #resultsTable [nzData]="profileData.testResults" [nzPageSize]="5">
                    <thead>
                        <tr>
                            <th>Тест атауы</th>
                            <th>Балл</th>
                            <th>Пайыз</th>
                            <th>Әрекет</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let result of resultsTable.data">
                            <td><span style="font-weight: 700">{{ result.testName }}</span></td>
                            <td><nz-tag nzColor="blue">{{ result.correctAnswers }} / {{ result.totalQuestions
                                    }}</nz-tag></td>
                            <td>
                                <nz-progress [nzPercent]="result.percentage" nzSize="small"
                                    [nzStatus]="result.percentage >= 50 ? 'success' : 'exception'"></nz-progress>
                            </td>
                            <td>
                                <button nz-button nzType="link" [routerLink]="['/user/result-detail', result.id]">
                                    Толығырақ <i nz-icon nzType="arrow-right"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </nz-table>
                <div *ngIf="profileData.testResults?.length === 0" style="text-align: center; padding: 40px;">
                    <i nz-icon nzType="inbox"
                        style="font-size: 3rem; color: #cbd5e1; display: block; margin-bottom: 12px;"></i>
                    <p style="color: var(--text-muted)">Сізде әлі тест нәтижелері жоқ.</p>
                </div>
            </nz-card>

            <nz-card [nzBordered]="false" class="profile-card" style="margin-top: 24px;">
                <div class="section-title">
                    <i nz-icon nzType="lock"></i> Құпиясөзді өзгерту
                </div>
                <form nz-form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="form-grid">
                    <nz-form-item>
                        <nz-form-label [nzNoColon]="true">Ескі құпиясөз</nz-form-label>
                        <nz-form-control>
                            <div class="password-input-wrapper">
                                <input [type]="passwordVisible ? 'text' : 'password'" nz-input
                                    formControlName="oldPassword" />
                                <i nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'" class="eye-icon"
                                    (click)="passwordVisible = !passwordVisible"></i>
                            </div>
                        </nz-form-control>
                    </nz-form-item>
                    <nz-form-item>
                        <nz-form-label [nzNoColon]="true">Жаңа құпиясөз</nz-form-label>
                        <nz-form-control>
                            <div class="password-input-wrapper">
                                <input [type]="newPasswordVisible ? 'text' : 'password'" nz-input
                                    formControlName="newPassword" />
                                <i nz-icon [nzType]="newPasswordVisible ? 'eye-invisible' : 'eye'" class="eye-icon"
                                    (click)="newPasswordVisible = !newPasswordVisible"></i>
                            </div>
                        </nz-form-control>
                    </nz-form-item>
                    <nz-form-item class="full-width">
                        <nz-form-label [nzNoColon]="true">Құпиясөзді растау</nz-form-label>
                        <nz-form-control>
                            <div class="password-input-wrapper">
                                <input [type]="confirmPasswordVisible ? 'text' : 'password'" nz-input
                                    formControlName="confirmPassword" />
                                <i nz-icon [nzType]="confirmPasswordVisible ? 'eye-invisible' : 'eye'" class="eye-icon"
                                    (click)="confirmPasswordVisible = !confirmPasswordVisible"></i>
                            </div>
                        </nz-form-control>
                    </nz-form-item>
                    <div class="full-width" style="text-align: right;">
                        <button nz-button nzType="primary" [disabled]="passwordForm.invalid">Сақтау</button>
                    </div>
                </form>
            </nz-card>
        </div>
    </div>
</div>
