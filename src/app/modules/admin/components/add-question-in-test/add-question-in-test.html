<div class="parent">
  <div class="child animate-fade">
    <div class="form-header">
      <h2>{{ isEditMode ? 'Сұрақты өңдеу' : 'Жаңа сұрақ қосу' }}</h2>
      <p>Тест мазмұнын сапалы сұрақтармен толтырыңыз</p>
    </div>

    <form nz-form [formGroup]="questionForm" (ngSubmit)="submitForm()">
      <div style="margin-bottom: 24px;">
        <nz-form-label [nzNoColon]="true">Сұрақ мәтіні</nz-form-label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Сұрақ мәтінін енгізіңіз!">
            <textarea nz-input formControlName="questionText" placeholder="Мысалы: Қазақстанның астанасы қай қала?"
              [nzAutosize]="{ minRows: 2, maxRows: 4 }" #questionInput></textarea>
          </nz-form-control>
        </nz-form-item>
      </div>

      <div class="options-grid">
        <div>
          <nz-form-label [nzNoColon]="true">Сұрақ түрі</nz-form-label>
          <nz-form-item>
            <nz-form-control>
              <nz-select formControlName="questionType">
                <nz-option nzValue="MULTIPLE_CHOICE" nzLabel="Көп таңдаулы (4 нұсқа)"></nz-option>
                <nz-option nzValue="TRUE_FALSE" nzLabel="Ақиқат / Жалған"></nz-option>
                <nz-option nzValue="SHORT_ANSWER" nzLabel="Қысқа жауап"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div>
          <nz-form-label [nzNoColon]="true">Дұрыс жауап</nz-form-label>
          <nz-form-item>
            <nz-form-control nzErrorTip="Дұрыс жауапты таңдаңыз!">
              <ng-container [ngSwitch]="questionForm.get('questionType')?.value">
                <nz-select *ngSwitchCase="'MULTIPLE_CHOICE'" formControlName="correctOption"
                  placeholder="Нұсқаны таңдаңыз">
                  <nz-option nzValue="optionA" nzLabel="A нұсқасы"></nz-option>
                  <nz-option nzValue="optionB" nzLabel="B нұсқасы"></nz-option>
                  <nz-option nzValue="optionC" nzLabel="C нұсқасы"></nz-option>
                  <nz-option nzValue="optionD" nzLabel="D нұсқасы"></nz-option>
                </nz-select>
                <nz-select *ngSwitchCase="'TRUE_FALSE'" formControlName="correctOption" placeholder="Таңдаңыз">
                  <nz-option nzValue="True" nzLabel="Ақиқат"></nz-option>
                  <nz-option nzValue="False" nzLabel="Жалған"></nz-option>
                </nz-select>
                <input *ngSwitchDefault type="text" nz-input formControlName="correctOption"
                  placeholder="Жауапты жазыңыз" />
              </ng-container>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div *ngIf="questionForm.get('questionType')?.value === 'MULTIPLE_CHOICE'" class="options-grid"
        style="margin-top: 10px; background: rgba(99, 102, 241, 0.03); padding: 20px; border-radius: 16px;">
        <div>
          <nz-form-label [nzNoColon]="true">A нұсқасы</nz-form-label>
          <nz-form-item>
            <nz-form-control nzErrorTip="Мәтінді толтырыңыз!">
              <input type="text" nz-input formControlName="optionA" placeholder="A нұсқасы" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div>
          <nz-form-label [nzNoColon]="true">B нұсқасы</nz-form-label>
          <nz-form-item>
            <nz-form-control nzErrorTip="Мәтінді толтырыңыз!">
              <input type="text" nz-input formControlName="optionB" placeholder="B нұсқасы" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div>
          <nz-form-label [nzNoColon]="true">C нұсқасы</nz-form-label>
          <nz-form-item>
            <nz-form-control nzErrorTip="Мәтінді толтырыңыз!">
              <input type="text" nz-input formControlName="optionC" placeholder="C нұсқасы" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div>
          <nz-form-label [nzNoColon]="true">D нұсқасы</nz-form-label>
          <nz-form-item>
            <nz-form-control nzErrorTip="Мәтінді толтырыңыз!">
              <input type="text" nz-input formControlName="optionD" placeholder="D нұсқасы" />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div class="image-upload-block">
        <nz-form-label [nzNoColon]="true">Картинка вопроса (optional)</nz-form-label>
        <div *ngIf="isEditMode && hasExistingImage && !removeCurrentImage" class="current-image-box">
          <img [src]="resolveImageUrl(existingImageUrl)" alt="Current question image" class="question-image-preview" />
        </div>

        <input #imageInput type="file" accept="image/*" (change)="onImageSelected($event)" />

        <div *ngIf="selectedImageFile" class="file-name">
          Выбран файл: {{ selectedImageFile.name }}
        </div>

        <label *ngIf="isEditMode && hasExistingImage" class="remove-image-toggle">
          <input type="checkbox" [checked]="removeCurrentImage" (change)="onRemoveImageToggle($event)" />
          Удалить текущее фото
        </label>
      </div>

      <div style="margin-top: 24px;">
        <nz-form-label [nzNoColon]="true">Түсініктеме (міндетті емес)</nz-form-label>
        <nz-form-item>
          <nz-form-control>
            <textarea nz-input formControlName="explanation" placeholder="Дұрыс жауапқа түсінік беріңіз..."
              [nzAutosize]="{ minRows: 2, maxRows: 4 }"></textarea>
          </nz-form-control>
        </nz-form-item>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 32px;">
        <button nz-button type="button" class="back-btn" (click)="goBack()">
          <i nz-icon nzType="arrow-left"></i> Артқа қайту
        </button>
        <button nz-button class="login-form-button" nzType="primary" [disabled]="questionForm.invalid">
          {{ isEditMode ? 'Сақтау' : 'Қосу' }}
        </button>
      </div>
    </form>
  </div>
</div>
