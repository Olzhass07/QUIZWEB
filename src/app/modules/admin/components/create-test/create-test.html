<div class="parent">
  <div class="child animate-fade">
    <div class="form-header">
      <h2>Жаңа тест құру</h2>
      <p>Сұрақтарды қоспас бұрын тесттің негізгі мәліметтерін толтырыңыз</p>
    </div>

    <form nz-form [formGroup]="testForm" (ngSubmit)="submitForm()">
      <div style="margin-bottom: 24px;">
        <nz-form-label [nzNoColon]="true">Тест атауы</nz-form-label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Тест атауын енгізіңіз!">
            <input type="text" nz-input formControlName="title" placeholder="Мысалы: Математика негіздері" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div style="margin-bottom: 24px;">
        <nz-form-label [nzNoColon]="true">Сипаттамасы</nz-form-label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Сипаттамасын жазыңыз!">
            <textarea nz-input formControlName="description" placeholder="Тест туралы қысқаша ақпарат..."
              [nzAutosize]="{ minRows: 3, maxRows: 6 }"></textarea>
          </nz-form-control>
        </nz-form-item>
      </div>

      <div style="margin-bottom: 32px;">
        <nz-form-label [nzNoColon]="true">Уақыт шегі (секундпен)</nz-form-label>
        <nz-form-item>
          <nz-form-control nzErrorTip="Уақытты көрсетіңіз!">
            <nz-input-number [nzMin]="30" [nzStep]="30" formControlName="time" style="width: 100%; border-radius: 14px;"
              nzPlaceHolder="Мысалы: 1800 (30 минут)"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>

      <button nz-button class="login-form-button" nzType="primary" [disabled]="testForm.invalid">
        Тестті сақтау және жалғастыру
      </button>

      <a routerLink="/admin/dashboard" class="back-link">
        <i nz-icon nzType="arrow-left"></i> Дашбордқа оралу
      </a>
    </form>
  </div>
</div>
